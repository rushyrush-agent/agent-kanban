services:
  backend:
    build: ./backend
    ports:
      - "8444:8444"
    volumes:
      - task-data:/app/data
    environment:
      - PORT=8444
      - DATABASE_PATH=/app/data/tasks.db
    restart: unless-stopped
    networks:
      - task-network

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8444
    restart: unless-stopped
    networks:
      - task-network
    depends_on:
      - backend

networks:
  task-network:
    driver: bridge

volumes:
  task-data:
    driver: local